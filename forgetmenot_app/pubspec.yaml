name: forgetmenot
description: ForgetMeNot - Alzheimer's Assistant App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  provider: ^6.1.2
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  just_audio: ^0.9.38
  audioplayers: ^6.0.0
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
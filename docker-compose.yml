services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: forgetmenot-backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_HOST: minio
      MINIO_PORT: 9000
    volumes:
      - ./data:/app/data
      - ./audio:/app/audio
      - ./faces:/app/faces
      - ./logs:/app/logs
    depends_on:
      - postgres
      - qdrant
      - redis
      - minio
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: forgetmenot-frontend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: forgetmenot-nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: forgetmenot-postgres
    environment:
      POSTGRES_DB: forgetmenot
      POSTGRES_USER: forgetmenot
      POSTGRES_PASSWORD: forgetmenot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: forgetmenot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: forgetmenot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: forgetmenot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  minio_data:
